version: 2

models:
  - name: mart_store_sales_15min
    description: "15-minute grain feature store for ML training and inference. Joins current rolling slot demand with historical slot baselines. QUALIFY keeps the latest slot per store/item for inference."
    columns:
      - name: slot_index
        description: "Integer 0-671 identifying the 15-min slot within the week. Matches the simulator's slot_idx calculation."
      - name: slot_quantity
        description: "Actual units sold in this 15-min slot."
      - name: avg_slot_quantity
        description: "Historical average units sold for this store/item/slot/day-of-week combination."
      - name: sample_size
        description: "Number of observations contributing to the historical average. Used for cold-start threshold."

  - name: mart_waste_percentage
    description: "Tracks the ratio of items wasted versus items sold, used for kitchen efficiency KPIs."

  - name: mart_cold_start_profile
    description: "Fallback baseline profiles for new items (less than 7 days old) based on category-level averages."

  - name: mart_stockout_summary
    description: "Aggregates missed demand events by store, item, and hour. Used to quantify lost revenue and evaluate production plan sufficiency."
    columns:
      - name: total_missed_units
        description: "The total number of units requested by customers that could not be sold due to zero inventory."
      - name: event_count
        description: "The number of unique stockout occurrences in this hour."